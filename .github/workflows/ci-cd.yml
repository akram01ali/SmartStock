name: CI/CD Pipeline

on:
  push:
    branches:
      - production

jobs:

  # ── Lint & Test (GitHub-hosted, fast) ──────────────────────────────────────
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Overall Lint & Test
        run: echo "Overall testing not yet implemented"

      - name: Backend Lint & Test
        if: ${{ contains(github.event.head_commit.modified, 'server/') || contains(github.event.head_commit.added, 'server/') || contains(github.event.head_commit.removed, 'server/') }}
        run: echo "Testing for backend/ not yet implemented"

      - name: Admin Dashboard Lint & Test
        if: ${{ contains(github.event.head_commit.modified, 'apps/admin-dashboard/') || contains(github.event.head_commit.added, 'apps/admin-dashboard/') || contains(github.event.head_commit.removed, 'apps/admin-dashboard/') }}
        run: |
          npm install --prefix apps/admin-dashboard
          echo "Testing for apps/admin-dashboard/ not yet implemented"

      - name: Mobile Lint & Test
        if: ${{ contains(github.event.head_commit.modified, 'apps/smartstock-mobile/') || contains(github.event.head_commit.added, 'apps/smartstock-mobile/') || contains(github.event.head_commit.removed, 'apps/smartstock-mobile/') }}
        run: |
          npm install --prefix apps/smartstock-mobile
          echo "Testing for apps/smartstock-mobile/ not yet implemented"

  # ── Build Docker Hub images (GitHub-hosted, for Pi) ────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and Push Backend Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/smartstock_backend:latest

      - name: Build and Push Admin Dashboard Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./apps/admin-dashboard
          file: ./apps/admin-dashboard/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/smartstock_admin_dashboard:latest
          build-args: |
            REACT_APP_API_URL=${{ vars.RPI_API_URL }}

  # ── Deploy to Raspberry Pi (ARM64 self-hosted runner) ──────────────────────
  deploy-pi:
    runs-on: [self-hosted, Linux, ARM64]
    needs: build
    steps:
      - uses: actions/checkout@v3

      - name: Pull images from Docker Hub
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/smartstock_backend:latest
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/smartstock_admin_dashboard:latest

      - name: Check for schema changes
        id: check-migration
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q "server/prisma/schema.prisma"; then
            echo "schema-changed=true" >> $GITHUB_OUTPUT
          else
            echo "schema-changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Prisma DB push
        if: steps.check-migration.outputs.schema-changed == 'true'
        run: |
          cd ~/SmartStock
          docker compose up -d postgres
          timeout 60s bash -c 'until docker exec smartstock_postgres pg_isready -U postgres; do sleep 2; done'
          docker compose exec -T backend npx prisma db push

      - name: Deploy all containers
        run: |
          cd ~/SmartStock
          docker compose down
          docker compose up -d --force-recreate

      - name: Cleanup old images
        run: docker image prune -f

  # ── Deploy to Desktop (X64 self-hosted runner) ─────────────────────────────
  deploy-desktop:
    runs-on: [self-hosted, Linux, X64]
    needs: lint-and-test   # No Docker Hub build needed — builds locally
    steps:
      - name: Pull latest code
        run: |
          cd ~/SmartStock
          git pull origin production

      - name: Check for schema changes
        id: check-schema
        run: |
          cd ~/SmartStock
          if git diff HEAD~1 HEAD --name-only | grep -q "server/prisma/schema.prisma"; then
            echo "schema-changed=true" >> $GITHUB_OUTPUT
          else
            echo "schema-changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and restart app containers (keep DB running)
        run: |
          cd ~/SmartStock
          # Rebuild and restart only the app containers — postgres is left untouched
          docker compose up -d --build --no-recreate postgres
          docker compose up -d --build backend admin-dashboard nginx

      - name: Run Prisma DB push if schema changed
        if: steps.check-schema.outputs.schema-changed == 'true'
        run: |
          cd ~/SmartStock
          echo "Schema changed — running prisma db push..."
          timeout 60s bash -c 'until docker exec smartstock_postgres pg_isready -U postgres; do sleep 2; done'
          docker compose exec -T backend npx prisma db push

      - name: Cleanup old images
        run: docker image prune -f
